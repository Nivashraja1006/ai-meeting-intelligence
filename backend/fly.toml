app = "ai-meeting-intelligence-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  DATABASE_URL = "sqlite:////app/data/meetings.db"
  ANTHROPIC_MODEL = "claude-sonnet-4-20250514"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    path = "/health"

[[mounts]]
  source = "meeting_data"
  destination = "/app/data"
  initial_size = "1gb"

[vm]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
